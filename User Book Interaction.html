}

    width: 100%;

    background-color: #030303;

    font-size: 16px;

}

button:hover {

      <script>
          function markFavorite(btn) {
              btn.innerText = "★ Favorite";
              btn.style.backgroundColor = "orange";
          }
      </script>

  <body>
      <h2>User Book Interaction Table</h2>
      <form action="User Book Interaction Table.php" method="post">
      <form>
          <label for="userId">User ID:</label>
          <input type="text" id="userId" name="userId" required>
          
          <label for="bookId">Book ID:</label>
          <input type="text" id="bookId" name="bookId" required>
          
          <label for="bookTitle">Book Title:</label>
          <input type="text" id="bookTitle" name="bookTitle" required>
          
          <label for="borrowDate">Borrow Date:</label>
          <input type="date" id="borrowDate" name="borrowDate" required>
          
          <label for="returnDate">Return Date:</label>
          <input type="date" id="returnDate" name="returnDate" required>
          
          <label for="status">Status:</label>
          <select id="status" name="status" required>
              <option value="Borrowed">Borrowed</option></br>
              <option value="Returned">Returned</option></br>
          </select>
      
          <button type="submit">Add Entry </button>
      </form>
